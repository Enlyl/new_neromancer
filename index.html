<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DS://CORP ACCESS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Courier New',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

/* ── THEMES ─────────────────────────────────────── */
:root{
  --bg:#0a0a0f;--bg2:#09090e;--bg3:#12121a;--bg4:#11111a;--bg5:#0b0b14;
  --fg:#e8e8f0;--fg2:#b8b8cc;--fg3:#6b6b8a;--fg4:#3a3a4a;--fg5:#555;
  --brd:#1a1a2a;--brd2:#2a2a3a;
  --acc:#7c6dfa;--acc2:#fa6d9a;
  --xpbar:linear-gradient(90deg,#7c6dfa,#fa6d9a);
  --b1bg:#6dfabc20;--b1:#6dfabc;--b1b:#6dfabc40;
  --b2bg:#facc6d20;--b2:#facc6d;--b2b:#facc6d40;
  --scan:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px);
  --glow:#7c6dfa;--code-bg:#0b0b14;--code-brd:#1a2a1a;--code-kw:#9b8dfa;--code-cm:#4a5a4a;
}
body.th-matrix{
  --bg:#000800;--bg2:#000a00;--bg3:#001200;--bg4:#001000;--bg5:#000900;
  --fg:#00ff41;--fg2:#00cc33;--fg3:#008822;--fg4:#004d14;--fg5:#003a0e;
  --brd:#004d14;--brd2:#008822;--acc:#00ff41;--acc2:#39ff14;
  --xpbar:linear-gradient(90deg,#00ff41,#39ff14);
  --b1bg:#00ff4118;--b1:#00ff41;--b1b:#00ff4140;
  --b2bg:#39ff1418;--b2:#39ff14;--b2b:#39ff1440;
  --scan:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.05) 2px,rgba(0,255,65,.05) 4px);
  --glow:#00ff41;--code-bg:#000a00;--code-brd:#004d14;--code-kw:#39ff14;--code-cm:#005522;
}
body.th-redteam{
  --bg:#0f0000;--bg2:#110000;--bg3:#1c0000;--bg4:#160000;--bg5:#0d0000;
  --fg:#ff4455;--fg2:#dd2233;--fg3:#991122;--fg4:#661122;--fg5:#441111;
  --brd:#661122;--brd2:#991122;--acc:#ff4455;--acc2:#ff8833;
  --xpbar:linear-gradient(90deg,#ff4455,#ff8833);
  --b1bg:#ff445518;--b1:#ff4455;--b1b:#ff445540;
  --b2bg:#ff883318;--b2:#ff8833;--b2b:#ff883340;
  --scan:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,0,0,.03) 2px,rgba(255,0,0,.03) 4px);
  --glow:#ff4455;--code-bg:#110000;--code-brd:#661122;--code-kw:#ff6677;--code-cm:#663333;
}
body.th-deepsea{
  --bg:#000d1a;--bg2:#000f1f;--bg3:#001830;--bg4:#001428;--bg5:#000c18;
  --fg:#00d4ff;--fg2:#0099cc;--fg3:#006688;--fg4:#004466;--fg5:#003355;
  --brd:#004466;--brd2:#006688;--acc:#00d4ff;--acc2:#0077ff;
  --xpbar:linear-gradient(90deg,#00d4ff,#0077ff);
  --b1bg:#00d4ff18;--b1:#00d4ff;--b1b:#00d4ff40;
  --b2bg:#0077ff18;--b2:#0077ff;--b2b:#0077ff40;
  --scan:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,180,255,.04) 2px,rgba(0,180,255,.04) 4px);
  --glow:#00d4ff;--code-bg:#000d1a;--code-brd:#004466;--code-kw:#33ddff;--code-cm:#005577;
}
body.th-ghost{
  --bg:#f4f4f4;--bg2:#ebebeb;--bg3:#ffffff;--bg4:#f8f8f8;--bg5:#e8e8e8;
  --fg:#111111;--fg2:#333333;--fg3:#777777;--fg4:#aaaaaa;--fg5:#bbbbbb;
  --brd:#dddddd;--brd2:#cccccc;--acc:#222222;--acc2:#555555;
  --xpbar:linear-gradient(90deg,#222,#666);
  --b1bg:#22222212;--b1:#222222;--b1b:#22222230;
  --b2bg:#55555512;--b2:#555555;--b2b:#55555530;
  --scan:none;--glow:#222;--code-bg:#f0f0f0;--code-brd:#dddddd;--code-kw:#2200aa;--code-cm:#888888;
}
body.th-retro{
  --bg:#1a0a2e;--bg2:#150826;--bg3:#220d3a;--bg4:#1c0a30;--bg5:#120720;
  --fg:#ff44ff;--fg2:#cc22cc;--fg3:#881188;--fg4:#550055;--fg5:#440044;
  --brd:#550055;--brd2:#881188;--acc:#ff44ff;--acc2:#44ffff;
  --xpbar:linear-gradient(90deg,#ff44ff,#44ffff);
  --b1bg:#ff44ff18;--b1:#ff44ff;--b1b:#ff44ff40;
  --b2bg:#44ffff18;--b2:#44ffff;--b2b:#44ffff40;
  --scan:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,0,255,.07) 3px,rgba(255,0,255,.07) 4px),repeating-linear-gradient(90deg,transparent,transparent 3px,rgba(0,255,255,.03) 3px,rgba(0,255,255,.03) 4px);
  --glow:#ff44ff;--code-bg:#12051e;--code-brd:#550055;--code-kw:#ff44ff;--code-cm:#553355;
}

/* Matrix rain canvas */
#matrix-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9994;opacity:0;transition:opacity .5s}
body.th-matrix #matrix-canvas{opacity:.45}

.scanlines{position:fixed;inset:0;background:var(--scan,none);pointer-events:none;z-index:9997}
body.th-ghost .scanlines{display:none}

@keyframes glow{0%,100%{text-shadow:0 0 6px var(--glow)}50%{text-shadow:0 0 18px var(--glow),0 0 35px var(--glow)}}
@keyframes slideIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pixelFlicker{0%,100%{opacity:1}50%{opacity:.8}}
body.th-retro .glow{animation:glow 1.2s infinite,pixelFlicker 2s infinite}
.glow{animation:glow 2.5s infinite}
.fade{animation:fadeUp .25s ease}

/* HEADER */
#header{border-bottom:1px solid var(--brd);padding:10px 20px;display:flex;align-items:center;gap:12px;background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
#logo{font-size:15px;font-weight:bold;color:var(--acc);letter-spacing:2px;white-space:nowrap}
#xp-wrap{flex:1;max-width:240px;min-width:80px}
#xp-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px}
#xp-track{height:5px;background:var(--brd);border-radius:3px;overflow:hidden}
#xp-fill{height:100%;background:var(--xpbar);border-radius:3px;transition:width .6s}
.hbadge{background:var(--b1bg);color:var(--b1);padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid var(--b1b);white-space:nowrap}
.hbadge2{background:var(--b2bg);color:var(--b2);padding:2px 8px;border-radius:4px;font-size:10px;border:1px solid var(--b2b);white-space:nowrap}
#menu-btn{background:none;border:1px solid var(--brd2);color:var(--fg3);border-radius:5px;padding:4px 9px;cursor:pointer;font-size:14px;flex-shrink:0}
#menu-btn:hover{border-color:var(--acc)}

/* THEME SWITCHER */
#theme-bar{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tbar-lbl{font-size:9px;color:var(--fg4);letter-spacing:1px;margin-right:2px}
.tdot{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .18s;flex-shrink:0}
.tdot:hover{transform:scale(1.25)}
.tdot.on{border-color:var(--fg)!important;box-shadow:0 0 8px var(--glow)}
.tdot[data-t="cyber"]  {background:radial-gradient(circle,#7c6dfa,#fa6d9a)}
.tdot[data-t="matrix"] {background:radial-gradient(circle,#00ff41,#004d14)}
.tdot[data-t="redteam"]{background:radial-gradient(circle,#ff4455,#881122)}
.tdot[data-t="deepsea"]{background:radial-gradient(circle,#00d4ff,#0044aa)}
.tdot[data-t="ghost"]  {background:radial-gradient(circle,#fff,#aaa);border-color:#ccc!important}
.tdot[data-t="retro"]  {background:radial-gradient(circle,#ff44ff,#44ffff)}

/* BODY */
#body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
#sidebar{width:270px;min-width:270px;border-right:1px solid var(--brd);overflow-y:auto;background:var(--bg2);transition:all .3s;flex-shrink:0}
#sidebar.closed{width:0;min-width:0;overflow:hidden}
#sb-inner{padding:12px;width:270px}
.sec-label{font-size:9px;color:var(--fg4);letter-spacing:2px;margin-bottom:8px}
.mod-card{background:transparent;border:1px solid var(--brd);border-radius:9px;padding:10px 11px;cursor:pointer;margin-bottom:5px;transition:all .15s;display:flex;align-items:flex-start;gap:8px}
.mod-card:hover{border-color:var(--acc);transform:translateX(3px)}
.mod-card.active{background:var(--mc,transparent);border-color:var(--mb,var(--acc))}
.mod-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.mod-info{flex:1;min-width:0}
.mod-code{font-size:9px;font-family:monospace}
.mod-title{font-size:11px;font-weight:bold;line-height:1.3;margin-top:2px}
.mod-xp{font-size:10px;color:var(--fg4);margin-top:2px}
.mod-done{font-size:12px;flex-shrink:0}
.ach-row{display:flex;gap:8px;align-items:center;margin-bottom:7px;transition:opacity .3s}
.ach-row.locked{opacity:.22}
.ach-icon{font-size:15px;flex-shrink:0}
.ach-title{font-size:10px;font-weight:bold;color:var(--b2)}
.ach-desc{font-size:9px;color:var(--fg4)}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:24px 26px;background:var(--bg)}

/* HOME */
#home-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:28px}
.home-card{background:var(--bg3);border:1px solid var(--brd);border-radius:10px;padding:14px 15px}
.home-card-icon{font-size:22px;margin-bottom:8px}
.home-card-title{font-size:12px;font-weight:bold;margin-bottom:3px}
.home-card-desc{font-size:10px;color:var(--fg4)}

/* MODULE PAGE */
.mod-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.mod-h-left .mod-code-big{font-size:9px;letter-spacing:3px;margin-bottom:4px}
.mod-h-left h2{font-size:19px;font-weight:bold;line-height:1.25}
.mod-h-left p{font-size:12px;color:var(--fg3);margin-top:4px}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;border-bottom:1px solid var(--brd);padding-bottom:10px}
.tab-btn{background:transparent;color:var(--fg5);border:1px solid var(--brd);border-radius:6px;padding:5px 13px;cursor:pointer;font-family:'Courier New',monospace;font-size:11px;transition:all .15s;white-space:nowrap}
.tab-btn.on{border-color:var(--tc);color:var(--tc);background:var(--tbg)}

/* SECTION NAV */
.sec-nav{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.snav-btn{background:transparent;color:var(--fg5);border:1px solid var(--brd);border-radius:6px;padding:5px 12px;cursor:pointer;font-family:'Courier New',monospace;font-size:10px;transition:all .15s;white-space:nowrap}
.snav-btn.on{border-color:var(--tc);color:var(--tc);background:var(--tbg)}

/* CONTENT BLOCKS */
.theory-box{background:var(--bg4);border:1px solid var(--brd);border-radius:10px;padding:22px}
.theory-box h3{font-size:13px;margin-bottom:14px;font-family:monospace}
.theory-text{font-size:14px;line-height:1.95;color:var(--fg2);white-space:pre-wrap;word-break:break-word}
.theory-text strong,.theory-text b{color:var(--fg)}
.case-box{border-radius:10px;padding:22px}
.case-label{font-size:9px;letter-spacing:2px;margin-bottom:12px}
.case-text{font-size:14px;line-height:1.95;color:var(--fg2);white-space:pre-wrap;word-break:break-word}
.task-box{border-radius:10px;padding:22px;margin-bottom:12px}
.task-label{font-size:9px;letter-spacing:2px;margin-bottom:12px}
.task-text{font-size:14px;line-height:1.95;color:var(--fg2);white-space:pre-wrap;word-break:break-word}

/* CODE BLOCK */
.code-wrap{background:var(--code-bg);border:1px solid var(--code-brd);border-radius:10px;overflow:hidden;margin-top:4px}
.code-header{display:flex;justify-content:space-between;align-items:center;padding:7px 15px;background:var(--bg4);border-bottom:1px solid var(--code-brd)}
.code-label{font-size:9px;color:var(--fg4);letter-spacing:2px}
.copy-btn{background:var(--bg3);color:var(--fg3);border:1px solid var(--brd2);border-radius:4px;padding:3px 10px;cursor:pointer;font-size:10px;font-family:monospace;transition:all .2s}
.copy-btn:hover{color:var(--acc);border-color:var(--acc)}
.code-pre{padding:18px;font-size:12px;line-height:1.75;color:var(--fg2);font-family:'Courier New',monospace;overflow-x:auto;white-space:pre;tab-size:4}

/* VISUAL */
.visual-wrap{background:var(--bg4);border:1px solid var(--brd);border-radius:12px;padding:20px}
.visual-label{font-size:10px;color:var(--acc);margin-bottom:10px;font-family:monospace}

/* BUTTONS */
.btn{background:var(--b1bg);color:var(--b1);border:1px solid var(--b1b);border-radius:6px;padding:7px 16px;cursor:pointer;font-family:'Courier New',monospace;font-size:12px;transition:all .15s}
.btn:hover{opacity:.8}
.btn-green{background:var(--b1bg);color:var(--b1);border:1px solid var(--b1b)}
.btn-muted{background:transparent;color:var(--fg4);border:1px solid var(--brd)}
.btn-done{background:var(--b1bg);color:var(--b1);border:1px solid var(--b1b);cursor:default}

/* NAV BOTTOM */
.nav-bottom{display:flex;gap:10px;margin-top:26px;padding-top:18px;border-top:1px solid var(--brd);flex-wrap:wrap}

/* ACHIEVEMENT POPUP */
#ach-popup{position:fixed;bottom:22px;right:22px;background:var(--bg3);border:1px solid var(--b2);border-radius:12px;padding:14px 18px;z-index:9999;max-width:265px;animation:slideIn .35s ease;box-shadow:0 0 25px var(--glow);display:none}
#ach-popup.show{display:block}
.ach-popup-top{font-size:9px;color:var(--b2);letter-spacing:2px;margin-bottom:8px}
.ach-popup-body{display:flex;gap:12px;align-items:center}
.ach-popup-icon{font-size:28px}
.ach-popup-title{font-weight:bold;color:var(--b2);font-size:13px}
.ach-popup-desc{font-size:11px;color:var(--fg3);margin-top:2px}
.ach-popup-xp{font-size:11px;color:var(--b1);margin-top:4px}

/* START BTN */
#start-btn{background:var(--b1bg);color:var(--acc);border:1px solid var(--b1b);border-radius:7px;padding:11px 26px;cursor:pointer;font-family:'Courier New',monospace;font-size:13px;transition:all .2s}
#start-btn:hover{background:var(--b1b)}

/* VISUAL helpers */
.matrix-cell{background:var(--bg3);color:var(--fg);padding:5px 10px;border-radius:4px;font-size:13px;font-family:monospace;border:1px solid var(--brd)}
.matrix-cell.green{background:var(--b1bg);color:var(--b1);font-weight:bold}
.matrix-cell.pink{background:var(--b2bg);color:var(--b2)}
.mat-label{font-size:10px;margin-bottom:5px;font-family:monospace}
.flex-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.math-sym{color:var(--b2);font-size:26px}
.conf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:310px;margin:0 auto}
.conf-cell{background:var(--bg3);border-radius:8px;padding:12px;text-align:center}
.conf-val{font-size:24px;font-weight:bold;font-family:monospace}
.conf-lbl{font-size:10px;color:var(--fg3);margin-top:3px}
.conf-sub{font-size:9px;margin-top:2px;opacity:.7}
.conf-metrics{display:flex;gap:18px;margin-top:10px;justify-content:center;flex-wrap:wrap}
.boost-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.boost-track{flex:1;height:8px;background:var(--brd);border-radius:4px;overflow:hidden}
.fold-row{display:flex;gap:4px;align-items:center;margin-bottom:5px}
.fold-lbl{font-size:10px;color:var(--fg3);width:48px;flex-shrink:0}
.fold-block{flex:1;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px}
.pipe-step{border-radius:8px;padding:8px 14px;font-size:11px;width:100%;text-align:center}
.pipe-connector{width:2px;height:10px;margin:0 auto}
.prog-row{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.prog-month{font-size:10px;color:var(--fg3);width:38px;flex-shrink:0}
.prog-track{flex:1;height:21px;background:var(--brd);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;opacity:.8;display:flex;align-items:center;padding-left:7px}
.prog-fill span{font-size:9px;color:#0a0a0f;font-weight:bold;white-space:nowrap;overflow:hidden}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.proj-card{border-radius:8px;padding:8px 11px;display:flex;gap:8px;align-items:center}
.proj-num{font-family:monospace;font-weight:bold;font-size:12px;flex-shrink:0}
.proj-name{font-size:11px;font-weight:600}
.proj-dom{font-size:10px;color:var(--fg3)}
.pd-table{border-collapse:collapse;font-size:12px;width:100%;font-family:monospace}
.pd-table th{padding:5px 11px;color:var(--acc);border-bottom:2px solid var(--brd2);text-align:left}
.pd-table td{padding:5px 11px;border-bottom:1px solid var(--brd)}
.td-pos{color:var(--b1)}.td-neg{color:var(--acc2,#fa6d9a)}
.eda-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:10px}
.eda-cell{height:13px;border-radius:2px}
/* SQL visual */
.sql-table{width:100%;border-collapse:collapse;font-size:12px;font-family:monospace;margin-bottom:10px}
.sql-table th{padding:5px 10px;text-align:left;border-bottom:2px solid var(--acc);color:var(--acc)}
.sql-table td{padding:5px 10px;border-bottom:1px solid var(--brd);color:var(--fg2)}
.sql-table tr:hover td{background:var(--b1bg)}
.sql-badge{display:inline-block;background:var(--b1bg);color:var(--b1);border:1px solid var(--b1b);border-radius:4px;padding:2px 8px;font-size:10px;font-family:monospace;margin:2px}
@media(max-width:600px){#sidebar{width:240px;min-width:240px}#sb-inner{width:240px}#content{padding:16px}.proj-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<canvas id="matrix-canvas"></canvas>
<div class="scanlines"></div>

<!-- HEADER -->
<div id="header">
  <button id="menu-btn" onclick="toggleSidebar()">&#9776;</button>
  <div id="logo" class="glow">&#11041; DS://CORP</div>
  <div id="xp-wrap">
    <div id="xp-label"><span id="xp-text" style="color:var(--acc)">LVL 1 &mdash; 0 XP</span><span style="color:var(--fg4)">3500 total</span></div>
    <div id="xp-track"><div id="xp-fill" style="width:0%"></div></div>
  </div>
  <span class="hbadge" id="mod-count">0/12 модулей</span>
  <span class="hbadge2" id="ach-count">0 достижений</span>
  <div id="theme-bar">
    <span class="tbar-lbl" style="font-size:9px;color:var(--fg4);letter-spacing:1px">ТЕМА:</span>
    <div class="tdot on" data-t="cyber"   title="Cyberpunk"   onclick="setTheme('cyber')"></div>
    <div class="tdot"    data-t="matrix"  title="Matrix"      onclick="setTheme('matrix')"></div>
    <div class="tdot"    data-t="redteam" title="Red Team"    onclick="setTheme('redteam')"></div>
    <div class="tdot"    data-t="deepsea" title="Deep Sea"    onclick="setTheme('deepsea')"></div>
    <div class="tdot"    data-t="ghost"   title="Ghost Mode"  onclick="setTheme('ghost')"></div>
    <div class="tdot"    data-t="retro"   title="Retro Pixel" onclick="setTheme('retro')"></div>
  </div>
</div>

<!-- BODY -->
<div id="body">
  <div id="sidebar"><div id="sb-inner">
    <div class="sec-label">// МОДУЛИ</div>
    <div id="mod-list"></div>
    <div style="border-top:1px solid var(--brd);margin-top:12px;padding-top:12px">
      <div class="sec-label">// ДОСТИЖЕНИЯ</div>
      <div id="ach-list"></div>
    </div>
  </div></div>
  <div id="content"></div>
</div>

<div id="ach-popup">
  <div class="ach-popup-top">// ДОСТИЖЕНИЕ РАЗБЛОКИРОВАНО</div>
  <div class="ach-popup-body">
    <div class="ach-popup-icon" id="ap-icon"></div>
    <div><div class="ach-popup-title" id="ap-title"></div><div class="ach-popup-desc" id="ap-desc"></div><div class="ach-popup-xp" id="ap-xp"></div></div>
  </div>

<b>Чеклист EDA:</b>
1. Shape и типы — сколько строк, что за колонки
2. Пропуски — где их нет, там им и не место

5. Выбросы — аномально большие/малые значения
6. Корреляции — какие признаки связаны с таргетом
7. Категориальные — уникальные значения, опечатки

<b>Самые частые проблемы в реальных датасетах:</b>
- Пропуски (NaN) там где их не ждёшь
- Даты записаны как строки ("2024-01-15")
- Числа записаны как строки ("1,234.56")
- Одно значение в разных форматах ("Москва", "москва")`,

print("\\n3. ДУБЛИКАТЫ")

 {id:"linear",code:"M-04",icon:"📈",xp:200,color:"#6db8fa",

   theory:`Чувак, линейная регрессия — это формула:
<b>ŷ = w₁x₁ + w₂x₂ + ... + wₙxₙ + b</b>

Где x — признаки, w — веса (находит алгоритм), b — bias, ŷ — предсказание.

<b>Как модель находит веса?</b>
Минимизирует MSE = 1/n × Σ(ŷᵢ - yᵢ)²

<b>Когда применять:</b>
✅ Предсказание цены квартиры
✅ Предсказание продаж
✅ Предсказание времени доставки
❌ «Выживет / не выживет» — это классификация

<b>Метрики регрессии:</b>
MAE — средняя абсолютная ошибка (понятна людям)
RMSE — штрафует большие ошибки сильнее
R² — от 0 до 1, насколько модель лучше «угадывания среднего»`,
   code:`from sklearn.datasets import fetch_california_housing

Accuracy — % правильных (врёт при дисбалансе классов!)

   theory:`<b>Кластеризация</b> — нет таргета, только данные. Разбить объекты на группы.

<b>K-Means алгоритм:</b>
1. Выбери K центроидов случайно
2. Назначь каждую точку ближайшему центроиду
3. Пересчитай центроиды (среднее кластера)
4. Повторяй до стабилизации

Как выбрать K? → Elbow Method (метод локтя).

<b>PCA (Principal Component Analysis):</b>
Снижение размерности. 100 признаков → 2–3 компоненты.
Использование: визуализация, ускорение обучения, удаление шума.

<b>ОБЯЗАТЕЛЬНО нормализовать перед кластеризацией!</b>

import pandas as pd
from sklearn.cluster import KMeans
from sklearn.decomposition import PCA
from sklearn.preprocessing import StandardScaler

np.random.seed(42)
data = {
    'age':      np.concatenate([np.random.normal(25,5,60), np.random.normal(45,8,80), np.random.normal(60,6,60)]),
    'income':   np.concatenate([np.random.normal(30000,5000,60), np.random.normal(70000,15000,80), np.random.normal(55000,8000,60)]),
    'spending': np.concatenate([np.random.normal(70,10,60), np.random.normal(50,20,80), np.random.normal(35,8,60)])
}
df = pd.DataFrame(data)

# Нормализация — ОБЯЗАТЕЛЬНО
scaler = StandardScaler()
X_sc = scaler.fit_transform(df)

# Elbow Method
print("Inertia (меньше = лучше, ищем 'локоть'):")
for k in range(2, 8):
    km = KMeans(k, random_state=42, n_init=10)
    print(f"K={k}: {km.fit(X_sc).inertia_:.0f}")

# Финальная кластеризация
km = KMeans(3, random_state=42, n_init=10)
df['cluster'] = km.fit_predict(X_sc)

print("\\nПрофиль кластеров:")
print(df.groupby('cluster')[['age','income','spending']].mean().round(0))

# PCA визуализация
pca = PCA(n_components=2)
X2d = pca.fit_transform(X_sc)
print(f"\\nPCA объясняет: {pca.explained_variance_ratio_.sum():.1%}")`,

Аналогия: студент зазубрил ответы на конкретные вопросы, не понял тему.

<b>Диагностика:</b>
Train accuracy = 99%
Test  accuracy = 65%
→ Классическое переобучение!

<b>Лечение:</b>
1. Больше данных — лучшее лекарство
2. Регуляризация L1/L2 — штрафуем сложность
3. Меньше признаков — убираем шум
4. max_depth, min_samples_leaf — для деревьев

<b>5-Fold Cross-Validation:</b>
Делим данные на 5 частей.
Обучаем 5 раз, каждый раз валидируемся на другой части.
Итог = среднее по 5 запускам. Честнее чем один split.

<b>Bias-Variance Tradeoff:</b>
Высокий Bias → Underfitting (слишком простая модель)
Высокая Variance → Overfitting (слишком сложная)
Цель: найти баланс.`,

   theory:`<b>Pipeline</b> — цепочка трансформаций + модель в одном объекте.

<b>БЕЗ Pipeline (опасно):</b>
scaler.fit(X_train)
X_train_sc = scaler.transform(X_train)
X_test_sc = scaler.transform(X_test)
→ Легко ошибиться → data leakage

<b>С Pipeline (правильно):</b>
pipe = Pipeline([('scaler', ...), ('model', ...)])
pipe.fit(X_train, y_train)
pipe.predict(X_test)  # всё автоматически

<b>Data Leakage</b> — информация из test попадает в обучение. Модель кажется точной, но в production провалится. Самая коварная ошибка в ML.

<b>Почему Pipeline обязателен:</b>
1. Защита от data leakage
2. Один объект = вся логика модели
3. Легко деплоить: joblib.dump(pipeline, 'model.pkl')
4. Работает с GridSearchCV / RandomizedSearchCV`,
   code:`import seaborn as sns
from sklearn.pipeline import Pipeline
from sklearn.compose import ColumnTransformer
from sklearn.preprocessing import StandardScaler, OneHotEncoder
from sklearn.impute import SimpleImputer
from sklearn.ensemble import RandomForestClassifier
from sklearn.model_selection import RandomizedSearchCV, train_test_split
from sklearn.metrics import classification_report

df = sns.load_dataset('titanic')
df = df[['survived','pclass','sex','age','fare','embarked']].copy()
X = df.drop('survived', axis=1)
y = df['survived']
Xtr, Xte, ytr, yte = train_test_split(X, y, test_size=.2, random_state=42)

num_t = Pipeline([('imp', SimpleImputer(strategy='median')),
                  ('sc',  StandardScaler())])
cat_t = Pipeline([('imp', SimpleImputer(strategy='most_frequent')),
                  ('ohe', OneHotEncoder(handle_unknown='ignore', sparse_output=False))])
pre = ColumnTransformer([
    ('num', num_t, ['age','fare','pclass']),
    ('cat', cat_t, ['sex','embarked'])
])

full_pipe = Pipeline([('pre', pre),
                      ('clf', RandomForestClassifier(random_state=42))])

params = {
    'clf__n_estimators':    [50, 100, 200],
    'clf__max_depth':       [3, 5, 7, None],
    'clf__min_samples_leaf':[1, 2, 5]
}
search = RandomizedSearchCV(full_pipe, params, n_iter=12,
                             cv=5, scoring='roc_auc', random_state=42)
search.fit(Xtr, ytr)
print(f"CV AUC: {search.best_score_:.3f}")
print(classification_report(yte, search.predict(Xte)))`,
   realcase:`В production Pipeline — стандарт. Сохраняется через joblib.dump(pipeline, 'model.pkl'), загружается на сервер. Весь препроцессинг (нормализация, OneHot) работает автоматически для каждого нового запроса.`,
   task:`1) Любой датасет с числовыми и категориальными признаками
2) Построй ColumnTransformer для разных типов
3) Полный Pipeline: препроцессинг + XGBoost
4) RandomizedSearchCV (10+ итераций)
5) Сохрани лучшую модель через joblib, загрузи обратно`,
   solution:`import joblib, seaborn as sns
from sklearn.pipeline import Pipeline
from sklearn.compose import ColumnTransformer
from sklearn.preprocessing import StandardScaler, OneHotEncoder
from sklearn.impute import SimpleImputer
from xgboost import XGBClassifier
from sklearn.model_selection import RandomizedSearchCV, train_test_split
from sklearn.metrics import roc_auc_score

df = sns.load_dataset('titanic')
df = df[['survived','pclass','sex','age','fare','embarked']].copy()
X = df.drop('survived',axis=1); y = df['survived']
Xtr,Xte,ytr,yte = train_test_split(X,y,test_size=.2,random_state=42)

n = Pipeline([('i',SimpleImputer(strategy='median')),('s',StandardScaler())])
c = Pipeline([('i',SimpleImputer(strategy='most_frequent')),('o',OneHotEncoder(handle_unknown='ignore',sparse_output=False))])
pre = ColumnTransformer([('n',n,['age','fare','pclass']),('c',c,['sex','embarked'])])
pipe = Pipeline([('p',pre),('m',XGBClassifier(eval_metric='logloss',verbosity=0,random_state=42))])
params={'m__n_estimators':[100,200],'m__max_depth':[3,5],'m__learning_rate':[0.05,0.1]}
s = RandomizedSearchCV(pipe,params,n_iter=10,cv=5,scoring='roc_auc',random_state=42)
s.fit(Xtr,ytr); print(f"CV AUC: {s.best_score_:.3f}")
joblib.dump(s.best_estimator_,'titanic_pipeline.pkl')
loaded = joblib.load('titanic_pipeline.pkl')
print(f"Loaded model AUC: {roc_auc_score(yte, loaded.predict_proba(Xte)[:,1]):.3f}")`}]},

-- Посчитай monthly retention

import pandas as pd

def retention(df):
    # df: user_id, date
    df['month'] = pd.to_datetime(df['date']).dt.to_period('M')
    months = sorted(df['month'].unique())
    result = []
    for i in range(len(months)-1):
        m1, m2 = months[i], months[i+1]
        u1 = set(df[df['month']==m1]['user_id'])
        u2 = set(df[df['month']==m2]['user_id'])
        ret = len(u1 & u2) / len(u1) * 100
        result.append({'month': str(m1), 'retention_%': round(ret,1)})
    return pd.DataFrame(result)`,

let popupTimer = null;
function showAchievement(ach) {
  const p = document.getElementById('ach-popup');
  document.getElementById('ap-icon').textContent  = ach.icon;
  document.getElementById('ap-title').textContent = ach.title;
  document.getElementById('ap-desc').textContent  = ach.desc;
  document.getElementById('ap-xp').textContent    = '+' + ach.xp + ' XP';
  p.classList.add('show');
  clearTimeout(popupTimer);
  popupTimer = setTimeout(() => p.classList.remove('show'), 3500);
}

function unlockAch(id) {
  if (state.achievements.has(id)) return;
  const a = ACHIEVEMENTS.find(x => x.id === id);
  if (!a) return;
  state.achievements.add(id);
  state.xp += a.xp;
  showAchievement(a);
}

function buildSidebar() {
  // modules
  const ml = document.getElementById('mod-list');
  ml.innerHTML = '';
  MODULES.forEach(mod => {
    const active = state.activeModuleId === mod.id;
    const done   = state.completed.has(mod.id);
    const div = document.createElement('div');
    div.className = 'mod-card' + (active ? ' active' : '');
    div.style.setProperty('--mc', mod.color + '12');
    div.style.setProperty('--mb', mod.color);
    div.innerHTML = `
      <span class="mod-icon">${mod.icon}</span>
      <div class="mod-info">
        <div class="mod-code" style="color:${mod.color}">${mod.code}</div>
        <div class="mod-title" style="color:${active ? mod.color : '#c8c8d8'}">${mod.title}</div>
        <div class="mod-xp">${mod.xp} XP</div>
      </div>
      ${done ? '<span class="mod-done">✅</span>' : ''}`;
    div.onclick = () => openModule(mod.id);
    ml.appendChild(div);
  });

  // achievements
  const al = document.getElementById('ach-list');
  al.innerHTML = '';
  ACHIEVEMENTS.forEach(a => {
    const div = document.createElement('div');
    div.className = 'ach-row' + (state.achievements.has(a.id) ? '' : ' locked');
    div.innerHTML = `<span class="ach-icon">${a.icon}</span><div><div class="ach-title">${a.title}</div><div class="ach-desc">${a.desc}</div></div>`;
    al.appendChild(div);
  });
}

// RENDER HELPERS
// ══════════════════════════════════════════════
function syntaxCode(code) {
  return code.split('\n').map(line => {
    const t = line.trim();
    if (t.startsWith('#') || t.startsWith('--')) return `<div style="color:#4a5a4a">${esc(line)}</div>`;
    if (/^(import |from |def |class |return |if |else:|elif |for |while |with |try:|except|async )/.test(t)) return `<div style="color:#9b8dfa">${esc(line)}</div>`;
    return `<div>${esc(line)}</div>`;
  }).join('');
}
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function completeModule() {
  const mod = MODULES.find(m => m.id === state.activeModuleId);
  if (!mod || state.completed.has(mod.id)) return;
  state.completed.add(mod.id);
  state.xp += mod.xp;

  if (mod.id === 'math')    unlockAch('math_done');
  if (mod.id === 'python')  unlockAch('python_done');
  if (['linear','classification','boosting'].includes(mod.id)) unlockAch('first_model');
  if (state.completed.size >= 5)          unlockAch('five_modules');
  if (state.completed.size === MODULES.length) unlockAch('all_done');
  if (mod.id === 'career')  unlockAch('career_done');

  save();
  render();
}

// Matrix rain
let matrixInterval = null;
function startMatrix() {
  const canvas = document.getElementById('matrix-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const cols = Math.floor(canvas.width / 16);
  const drops = Array(cols).fill(1);
  const chars = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
  matrixInterval = setInterval(() => {
    ctx.fillStyle = 'rgba(0,8,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px monospace';
    drops.forEach((y, i) => {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(ch, i * 16, y * 16);
      if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    });
  }, 45);
}
function stopMatrix() {
  if (matrixInterval) { clearInterval(matrixInterval); matrixInterval = null; }
  const canvas = document.getElementById('matrix-canvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}
